<style>
        .form-container { width: 450px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-header { background-color: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .form-body { padding: 20px; }
        .btn-register { background-color: #e91e63; color: white; border: none; } /* สีชมพูเข้มแบบในรูป */
        .btn-register:hover { background-color: #d81b60; color: white; }
        .btn-clear { background-color: #ff9800; color: white; border: none; } /* สีส้มแบบในรูป */
        .btn-clear:hover { background-color: #f57c00; color: white; }
    </style>

<!-- ใช้ d-flex และ vh-100 เพื่อให้สูงเต็มหน้าจอและจัดกึ่งกลาง -->
<div class="d-flex justify-content-center align-items-center mt-4">
    
    <div class="form-container" style="width: 100%; max-width: 400px;"> <!-- กำหนดความกว้างสูงสุดไว้กันล้น -->
        <div class="form-header">
            แบบฟอร์มบันทึกข้อมูลประชากร
        </div>
        <div class="form-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="name" class="form-label text-secondary small">ชื่อประชากร</label>
       
                    <input type="text" class="form-control form-control-sm" name="name" value="{{ person.name }}" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                </div>

                <div class="mb-3">
                    <label for="age" class="form-label text-secondary small">อายุ</label>

                    <input type="number" class="form-control form-control-sm" name="age" value="{{ person.age }}" placeholder="กรอกข้อมูลอายุเป็นตัวเลข" required>
                </div>

        
                <div class="d-flex gap-2 mt-4 justify-content-center">
                    <button type="submit" class="btn btn-success">อัปเดตข้อมูล</button>
                    <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

</div>



<script>
    const textarea = document.getElementById('feedbackText');
    const charCountDisplay = document.getElementById('charCount');

    textarea.addEventListener('input', function() {
        const textLength = textarea.value.length;
        charCountDisplay.textContent = textLength;

        if (textLength > 100) {
            charCountDisplay.classList.add('limit-warn');
        } else {
            charCountDisplay.classList.remove('limit-warn');
        }
    });
</script>
{% endblock %}

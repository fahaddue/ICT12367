{% extends "base.html" %}

{% block title %}
<title>หน้าแรกของเว็บไซด์ - แนะนำพันธุ์แมว</title>
{% endblock %}

{% block content %}


<style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .hero-section { padding: 100px 0; background: linear-gradient(135deg, #ffffff 0%, #e9ecef 100%); }
        .feature-card { border: none; border-radius: 15px; transition: transform 0.3s; }
        .feature-card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .icon-box { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin-bottom: 20px; }
        .btn-primary { border-radius: 8px; padding: 12px 25px; font-weight: 600; }
        .integration-logos i { font-size: 2.5rem; color: #adb5bd; transition: color 0.3s; }
        .integration-logos i:hover { color: #0d6efd; }
    </style>

<body>


<header class="hero-section">
    <div class="container-fluid px-5"> <div class="row align-items-center text-center text-lg-start">
            <div class="col-lg-5">
                <h1 class="display-3 fw-bold mb-4">ต้องการ<span class="text-primary"> แมว</span> <br>แบบไหน เข้ามาเลือกได้เลย!</h1>
                <p class="lead mb-4">ค้นหาสายพันธุ์ที่ใช่ สำหรับไลฟ์สไตล์ของคุณ</p>
                <div class="d-grid d-sm-flex justify-content-center justify-content-lg-start gap-3">
                </div>
            </div>
            
            <div class="col-lg-7 mt-5 mt-lg-0">
                <div class="text-end">
                    <img src="https://s.isanook.com/wo/0/ud/49/247017/cat.jpg" 
                         alt="Cat Hero" 
                         class="img-fluid rounded-4 shadow-lg" 
                         style="width: 100%; object-fit: cover; min-height: 400px;">
                </div>
            </div>
        </div>
    </div>
</header>

    

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

{% endblock %}
